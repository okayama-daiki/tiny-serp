name: Deploy Lambda

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

env:
    AWS_REGION: ${{ secrets.AWS_REGION }}
    LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
    LAMBDA_EXECUTION_ROLE_ARN: ${{ secrets.LAMBDA_EXECUTION_ROLE_ARN }}
    LAMBDA_USER_AGENT: tiny-serp/0.1 (+https://github.com/okayama-daiki/tiny-serp)

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: production

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod

            - name: Run tests
              run: go test ./...

            - name: Build Lambda bootstrap
              run: |
                  rm -rf .dist/lambda
                  mkdir -p .dist/lambda
                  GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o .dist/lambda/bootstrap ./cmd/lambda

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6.0.0
              with:
                  aws-region: ${{ env.AWS_REGION }}
                  role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
                  role-session-name: ${{ github.run_id }}

            - name: Deploy Lambda function
              uses: aws-actions/aws-lambda-deploy@v1.1.0
              with:
                  function-name: ${{ env.LAMBDA_FUNCTION_NAME }}
                  code-artifacts-dir: .dist/lambda
                  handler: bootstrap
                  runtime: provided.al2023
                  architectures: arm64
                  memory-size: 128
                  timeout: 10
                  publish: false
                  role: ${{ env.LAMBDA_EXECUTION_ROLE_ARN }}
                  environment: '{"TINY_SERP_USER_AGENT":"${{ env.LAMBDA_USER_AGENT }}"}'
